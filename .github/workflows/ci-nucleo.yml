name: CI Nucleo

on:
  pull_request:
    branches: [main]
    paths:
      - 'fw/nucleo/**'
      - '.github/workflows/ci-nucleo.yml'
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check app formatting
        working-directory: fw/nucleo
        run: |
          find CM4/app CM7/app -type f \( -name '*.c' -o -name '*.h' \) ! -path 'CM4/app/FreeRTOSConfig.h' ! -path 'CM7/app/FreeRTOSConfig.h' -print0 \
            | xargs -0 clang-format --dry-run --Werror --style=file

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        core: [CM4, CM7]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi

      - name: Configure
        working-directory: fw/nucleo/${{ matrix.core }}
        run: cmake --preset Debug

      - name: Build
        working-directory: fw/nucleo/${{ matrix.core }}
        run: cmake --build --preset Debug
